spring.application.name=SgOviProject

spring.datasource.type=org.springframework.jdbc.datasource.DriverManagerDataSource
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.jdbcUrl=jdbc:postgresql://db-aules.uji.es:5432/${DB}
spring.datasource.username=${USER}
spring.datasource.password=${PASS}


# Ruta donde se guardarán los PDFs (dentro de static para poder acceder luego)
upload.directorio.contratos=src/main/resources/static/contracts/
# Límites para la subida de archivos
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB