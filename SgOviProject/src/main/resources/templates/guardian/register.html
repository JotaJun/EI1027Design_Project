<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalls Tutor Legal - SgOVI</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

<main class="login-container">
    <div class="login-card login-card-wide">

        <header class="login-header">
            <div class="logo-box">
                <img th:src="@{/images/logo_SgOvi.png}" alt="Logo SgOVI" class="logo-img">
                SgOVI
            </div>
            <p class="system-name">SISTEMA DE GESTIÓ DE L'OFICINA PER LA VIDA INDEPENDENT</p>
            <h2>Detalls de Tutor Legal</h2>
            <p class="login-subtitle">Crea la teva signatura digital per a operacions segures</p>
        </header>

        <form th:action="@{/guardian/register}" th:object="${guardianAccount}" method="post" class="login-form" novalidate>
            
            <input type="hidden" th:field="*{dni}">
            
            <div class="form-group">
                <label for="signatureCode">Signatura Digital (Codi PIN)</label>
                <div class="input-wrapper">
                    <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                    <input type="password" id="signatureCode" th:field="*{signatureCode}" placeholder="Introdueix un codi segur" maxlength="20" th:classappend="${#fields.hasErrors('signatureCode')} ? 'input-error' : ''" required autofocus>
                </div>
                <span th:if="${#fields.hasErrors('signatureCode')}" th:errors="*{signatureCode}" class="error-message"></span>
                <p class="login-subtitle" style="font-size: 11px; margin-top: 8px;">Aquest codi s'utilitzarà com a confirmació per a tràmits sensibles.</p>
            </div>

            <button type="submit" class="btn-primary btn-block btn-login">Finalitzar Registre</button>
        </form>

    </div>
</main>

</body>
</html>
