<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">

<head>
  <title>Tots els meus contractes</title>
</head>

<body>

<div layout:fragment="header">
  <th:block th:if="${session.userRole == 'TECHNICIAN'}">
    <div th:replace="~{fragments/technician-returnMain-header :: technician-returnMain-header}"></div>
  </th:block>
  <th:block th:if="${session.userRole == 'PAPPATI'}">
    <div th:replace="~{fragments/papPati-returnMain-header :: papPati-returnMain-header}"></div>
  </th:block>
  <th:block th:if="${session.userRole == 'LEGALGUARDIAN'}">
    <div th:replace="~{fragments/legalGuardian-returnMain-header :: legalGuardian-returnMain-header}"></div>
  </th:block>
  <th:block th:if="${session.userRole == 'OVIUSER'}">
    <div th:replace="~{fragments/user-returnMain-header :: user-returnMain-header }"></div>
  </th:block>
</div>

<main layout:fragment="content">
  <div class="container dashboard-main">

    <div class="requests-header-action">
      <h2 class="welcome-title">Els meus contractes</h2>
    </div>

    <div th:if="${#lists.isEmpty(contractsPaged)}" class="empty-state">
      <p>Encara no tens cap contracte registrat al sistema.</p>
    </div>

    <div th:unless="${#lists.isEmpty(contractsPaged)}" class="table-card"
         th:with="contractsPage=${contractsPaged[__${selectedPage}__]}">

      <table class="styled-table">
        <thead>
        <tr>
          <th>DATA CREACIÓ</th>
          <th>NOM</th>
          <th>DATA FI</th>
          <th>SALARI/HORA</th>
          <th class="text-center">ACCIONS</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${contractsPage}">

          <td th:text="${#temporals.format(item.contract.creationDate, 'dd/MM/yyyy')}">31/12/2026</td>
          <td><strong th:text="${item.contractedName}">Nom complet</strong></td>

          <td th:text="${item.contract.endDate != null ? #temporals.format(item.contract.endDate, 'dd/MM/yyyy') : 'Indefinit'}">31/12/2026</td>
          <td th:text="${item.contract.hourlySalary} + ' €/h'">10.5 €/h</td>

          <td class="text-center">
            <div class="actions-cell">

              <a th:href="@{/contract/details/{id}(id=${item.contract.idContract})}"
                 class="action-btn" title="Veure detalls del contracte">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </a>

            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

    <div th:unless="${#lists.isEmpty(contractsPaged)}" class="results-count">
      Mostrant del
      <strong th:text="${(selectedPage * pageLength) + 1}">1</strong>
      al
      <strong th:text="${(selectedPage * pageLength) + #lists.size(contractsPaged[selectedPage])}">5</strong>
      de
      <strong th:text="${totalContracts}">12</strong> contractes
    </div>

    <nav aria-label="Selecció de pàgina en llistat de contractes"
         th:unless="${#lists.isEmpty(contractsPaged)}"
         class="pagination-container">
      <ul class="pagination">
        <li class="page-item"
            th:classappend="${pageNumber == selectedPage + 1} ? 'active'"
            th:each="pageNumber : ${pageNumbers}">

          <a th:href="@{/contract/listAll(page=${pageNumber - 1})}"
             th:text="${pageNumber}" class="page-link">1</a>
        </li>
      </ul>
    </nav>

  </div>
</main>

</body>
</html>
