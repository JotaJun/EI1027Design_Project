<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Detall del Contracte - SgOVI</title>
</head>
<body>

<div layout:fragment="header">
    <div th:replace="~{fragments/user-returnMain-header :: user-returnMain-header }"></div>
</div>

<main layout:fragment="content">
    <div class="container dashboard-main">

        <div class="card-header-section card-header-icon-layout">
            <div class="icon-square icon-orange">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
            </div>
            <div>
                <h2 class="card-title">Detall del Contracte</h2>
                <p class="card-subtitle">Informació completa de les condicions laborals i document associat.</p>
            </div>
        </div>

        <br>

        <div class="card assistance-card">

            <div class="header-flex">
                <a th:href="@{${backUrl}}" class="btn-back">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Tornar al llistat
                </a>
            </div>

            <h3 class="detail-section-title mt-15">Dades Generals</h3>

            <div class="form-grid">
                <div class="detail-group">
                    <span class="detail-label">Data d'inici</span>
                    <div class="detail-value text-success" th:text="${#temporals.format(contract.startDate, 'dd/MM/yyyy')}"></div>
                </div>

                <div class="detail-group">
                    <span class="detail-label">Data de fi</span>
                    <div class="detail-value text-danger" th:text="${#temporals.format(contract.endDate, 'dd/MM/yyyy')}"></div>
                </div>

                <div class="detail-group mt-10">
                    <span class="detail-label">Salari per hora</span>
                    <div class="detail-value" th:text="${contract.hourlySalary} + ' €'"></div>
                </div>

                <div class="detail-group mt-10">
                    <span class="detail-label">Data de registre</span>
                    <div class="detail-value" th:text="${#temporals.format(contract.creationDate, 'dd/MM/yyyy')}"></div>
                </div>
            </div>

            <div class="detail-group mt-15">
                <span class="detail-label">Horari de treball</span>
                <div class="detail-description-box detail-value" th:text="${contract.schedule}"></div>
            </div>

            <h3 class="detail-section-title">Document Original PDF</h3>

            <div class="document-section">
                <embed th:src="@{'/' + ${contract.urlDocument}}"
                       type="application/pdf"
                       class="pdf-viewer">
            </div>

            <div class="form-actions-centered actions-bordered">
                <a th:href="@{/candidacy/details/{id}(id=${contract.idCandidacy})}" class="dash-btn dash-btn-outline btn-icon btn-constrained">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    Veure Candidatura Associada
                </a>
            </div>

        </div>

    </div>
</main>

</body>
</html>
