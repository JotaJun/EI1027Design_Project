<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Formalitzar Contracte - SgOVI</title>
</head>
<body>

<div layout:fragment="header">
    <div th:replace="~{fragments/user-returnMain-header :: user-returnMain-header }"></div>
</div>

<main layout:fragment="content">
    <div class="container dashboard-main">

        <div class="card-header-section card-header-icon-layout">
            <div class="icon-square icon-orange">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
            </div>
            <div>
                <h2 class="card-title">Formalitzar Contracte</h2>
                <p class="card-subtitle">Emplena les dades per a formalitzar la contractació del professional seleccionat. Els camps amb asterisc (<span class="required-asterisk">*</span>) són obligatoris.</p>
            </div>
        </div>

        <br>

        <div class="card assistance-card">

            <div class="requests-header-action">
                <a th:href="@{/candidacy/details/{id}(id=${contract.idCandidacy})}" class="btn-back">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Tornar a la candidatura
                </a>
            </div>

            <!-- MENSAJE DE AVISO (PDF PERDIDO) -->
            <div th:if="${avisoPdf != null}" class="alert-box alert-rejected mb-4">
                <div class="alert-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                        <line x1="12" y1="9" x2="12" y2="13"></line>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                </div>
                <div class="alert-content">
                    <h4 class="alert-title">Atenció</h4>
                    <p class="alert-message" th:text="${avisoPdf}"></p>
                </div>
            </div>

            <!-- MUY IMPORTANTE: enctype="multipart/form-data" para permitir subir el PDF -->
            <form th:action="@{/contract/add}" th:object="${contract}" method="post" enctype="multipart/form-data" class="assistance-form">

                <!-- Campo oculto para mantener el idCandidacy -->
                <input type="hidden" th:field="*{idCandidacy}" />

                <div class="form-grid">

                    <div class="form-group">
                        <label for="startDate">Data d'inici <span class="required-asterisk">*</span></label>
                        <div class="input-wrapper">
                            <input type="date" id="startDate" th:field="*{startDate}" required>
                        </div>
                        <span th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}" class="error-text"></span>
                    </div>

                    <div class="form-group">
                        <label for="endDate">Data de fi <span class="required-asterisk">*</span></label>
                        <div class="input-wrapper">
                            <input type="date" id="endDate" th:field="*{endDate}" required>
                        </div>
                        <span th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}" class="error-text"></span>
                    </div>

                    <div class="form-group">
                        <label for="hourlySalary">Salari per hora (€) <span class="required-asterisk">*</span></label>
                        <div class="input-wrapper">
                            <input type="number" id="hourlySalary" th:field="*{hourlySalary}" min="0.01" step="0.01" placeholder="Ex: 12.50" required>
                        </div>
                        <span th:if="${#fields.hasErrors('hourlySalary')}" th:errors="*{hourlySalary}" class="error-text"></span>
                    </div>

                    <div class="form-group form-full-width">
                        <label for="schedule">Horari de treball <span class="required-asterisk">*</span></label>
                        <div class="input-wrapper">
                            <input type="text" id="schedule" th:field="*{schedule}" placeholder="Ex: Dilluns a Divendres de 09:00 a 14:00" required>
                        </div>
                        <span th:if="${#fields.hasErrors('schedule')}" th:errors="*{schedule}" class="error-text"></span>
                    </div>

                    <div class="form-group form-full-width">
                        <label for="ficheroPdf">Document del contracte (només PDF) <span class="required-asterisk">*</span></label>
                        <!-- Usamos 'ficheroPdf' en el id y name, que es como lo espera @RequestParam en el controlador -->
                        <div class="input-wrapper">
                            <input type="file" id="ficheroPdf" name="ficheroPdf" accept=".pdf" required>
                        </div>
                        <span th:if="${#fields.hasErrors('urlDocument')}" th:errors="*{urlDocument}" class="error-text"></span>
                    </div>

                </div>

                <div class="form-actions form-actions-centered">
                    <button type="reset" class="dash-btn dash-btn-outline btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                            <path d="M3 3v5h5"></path>
                        </svg>
                        Netejar formulari
                    </button>
                    <button type="submit" class="dash-btn dash-btn-primary btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                        Formalitzar Contracte
                    </button>
                </div>

            </form>
        </div>

    </div>
</main>

</body>
</html>
