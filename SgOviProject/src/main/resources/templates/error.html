<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S'ha produït un error - SgOVI</title>

  <link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body>

<div class="login-container">

  <div class="login-card error-card-container">

    <div class="error-icon-circle">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    </div>

    <h1 class="error-title" th:text="${errorName}">Error desconegut</h1>

    <div class="error-message-box">
      <p th:text="${message}">Hi ha hagut un problema inesperat al processar la teva sol·licitud.</p>
    </div>

    <div class="form-actions-centered">
      <a th:if="${backUrl != '/'}"
         th:href="${backUrl}" class="btn-outline btn-icon">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon-18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Tornar enrere
      </a>

      <a th:href="@{/}" class="btn-primary btn-icon">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon-18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Anar a l'Inici
      </a>
    </div>

  </div>
</div>

</body>
</html>
