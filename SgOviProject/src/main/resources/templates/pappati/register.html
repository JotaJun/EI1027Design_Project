<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pas 2: Detalls Professionals - SgOVI</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-container">
    <div class="login-card login-card-wide">

        <header class="login-header">
            <div class="logo logo-centered">
                <img th:src="@{/images/logo_SgOvi.png}" alt="Logo SgOVI" class="logo-img">
                <span class="logo">SgOVI</span>
            </div>
            <p class="system-name">SISTEMA DE GESTIÓ DE L'OFICINA PER LA VIDA INDEPENDENT</p>
            <h2>Pas 2: Detalls Professionals</h2>
            <p class="login-subtitle">Completa el teu perfil per finalitzar el registre</p>
        </header>

        <form th:action="@{/pappati/register}" th:object="${papData}" method="post" class="login-form">

            <input type="hidden" th:field="*{dni}">

            <div class="form-group">
                <label for="staffType">Tipus de personal <span class="required-asterisk">*</span></label>
                <div class="select-wrapper">
                    <select id="staffType" th:field="*{staffType}" th:classappend="${#fields.hasErrors('staffType')} ? 'input-error' : ''" required>
                        <option value="">-- Selecciona un tipus --</option>
                        <option value="PAP">PAP – Personal d'Assistència Professional</option>
                        <option value="PATI">PATI – Personal d'Assistència Tècnica Individualitzada</option>
                    </select>
                </div>
                <span th:if="${#fields.hasErrors('staffType')}" th:errors="*{staffType}" class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="training">Formació <span class="required-asterisk">*</span></label>
                <div class="input-wrapper">
                    <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                        <path d="M6 12v5c0 1.1 2.7 2 6 2s6-.9 6-2v-5"></path>
                    </svg>
                    <input type="text" id="training" th:field="*{training}" placeholder="p.ex. Grau en Treball Social" th:classappend="${#fields.hasErrors('training')} ? 'input-error' : ''" required>
                </div>
                <span th:if="${#fields.hasErrors('training')}" th:errors="*{training}" class="error-message"></span>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="yearsOfExperience">Anys d'experiència <span class="required-asterisk">*</span></label>
                    <div class="input-wrapper">
                        <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                            <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"></path>
                            <line x1="12" y1="12" x2="12" y2="16"></line>
                            <line x1="10" y1="14" x2="14" y2="14"></line>
                        </svg>
                        <input type="number" id="yearsOfExperience" th:field="*{yearsOfExperience}" min="0" max="60" placeholder="p.ex. 3" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="urlCv">URL del Currículum (CV) <span class="required-asterisk">*</span></label>
                    <div class="input-wrapper">
                        <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                        </svg>
                        <input type="url" id="urlCv" th:field="*{urlCv}" placeholder="https://linkedin.com/in/perfil" required>
                    </div>
                </div>
            </div>

            <div class="form-group mb-4">
                <div class="mb-10">
                    <label class="label-flex">
                        <strong>Disponibilitat temporal</strong>
                        <span class="info-tooltip">
                    ?
                    <span class="tooltip-text">
                        <strong>No disponible:</strong> Deixa en blanc.<br><br>
                        <strong>Indefinida:</strong> Omple només inici.
                    </span>
                </span>
                    </label>
                </div>

                <div class="form-grid">
                    <div class="form-group m-0">
                        <label for="initialAvailableDate">Data d'inici (opcional)</label>
                        <div class="input-wrapper">
                            <input type="date" id="initialAvailableDate" th:field="*{initialAvailableDate}">
                        </div>
                    </div>
                    <div class="form-group m-0">
                        <label for="lastAvailableDate">Data de fi (opcional)</label>
                        <div class="input-wrapper">
                            <input type="date" id="lastAvailableDate" th:field="*{lastAvailableDate}">
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <div class="checkbox-container">
                    <input type="checkbox" id="drivingLicense" th:field="*{drivingLicense}">
                    <label for="drivingLicense"><strong>Disposo de permís de conduir</strong></label>
                </div>
            </div>

            <button type="submit" class="btn-primary btn-block mt-15">
                <svg class="icon-18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                Finalitzar Registre
            </button>

        </form>

    </div>
</div>

</body>
</html>
