<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pas 2: Detalls Professionals - SgOVI</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        .login-card {
            max-width: 520px;
        }
        @media (max-width: 600px) {
            .login-card {
                padding: 30px 20px;
                border-radius: 12px;
            }
            .login-header h2 {
                font-size: 20px;
            }
            .login-container {
                padding: 20px 12px;
                align-items: flex-start;
            }
        }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-container">
    <div class="login-card">

        <!-- Capçalera -->
        <div class="login-header">
            <div class="logo-box">
                <img th:src="@{/images/logo_SgOvi.png}" alt="Logo SgOVI" class="logo-img">
                SgOVI
            </div>
            <p class="system-name">SISTEMA DE GESTIÓ DE L'OFICINA PER LA VIDA INDEPENDENT</p>
            <h2>Pas 2: Detalls Professionals</h2>
            <p class="login-subtitle">Completa el teu perfil per finalitzar el registre</p>
        </div>

        <!-- Formulari -->
        <form th:action="@{/pappati/register}" th:object="${papData}" method="post" class="login-form">

            <!-- Camp ocult: DNI (ve del pas anterior) -->
            <input type="hidden" th:field="*{dni}">
            <!-- Mostrar error intern del DNI si existeix -->
            <span th:if="${#fields.hasErrors('dni')}" th:errors="*{dni}" class="text-danger"
                  style="color: red; font-size: 0.85em; margin-top: -10px; margin-bottom: 15px; display: block; text-align: center;"></span>

            <!-- Tipus de personal -->
            <div class="form-group">
                <label for="staffType">Tipus de personal</label>
                <div class="select-wrapper">
                    <select id="staffType" th:field="*{staffType}" required>
                        <option value="">-- Selecciona un tipus --</option>
                        <option value="PAP">PAP – Personal d'Assistència Professional</option>
                        <option value="PATI">PATI – Personal d'Assistència Tècnica Individualitzada</option>
                    </select>
                </div>
                <span th:if="${#fields.hasErrors('staffType')}" th:errors="*{staffType}" class="text-danger"
                      style="color: red; font-size: 0.85em; margin-top: 5px; display: block;"></span>
            </div>

            <!-- Permís de conduir -->
            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 600; font-size: 13px;">
                    <input type="checkbox" id="drivingLicense" th:field="*{drivingLicense}"
                           style="width: 18px; height: 18px; accent-color: var(--color-primary); cursor: pointer;">
                    Disposo de permís de conduir
                </label>
            </div>

            <!-- Data d'inici de disponibilitat -->
            <div class="form-group">
                <label for="initialAvailableDate">Data d'inici de disponibilitat</label>
                <div class="input-wrapper">
                    <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <input type="date" id="initialAvailableDate" th:field="*{initialAvailableDate}" required>
                </div>
                <span th:if="${#fields.hasErrors('initialAvailableDate')}" th:errors="*{initialAvailableDate}" class="text-danger"
                      style="color: red; font-size: 0.85em; margin-top: 5px; display: block;"></span>
            </div>

            <!-- Data de fi de disponibilitat -->
            <div class="form-group">
                <label for="lastAvailableDate">Data de fi de disponibilitat</label>
                <div class="input-wrapper">
                    <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <input type="date" id="lastAvailableDate" th:field="*{lastAvailableDate}" required>
                </div>
                <span th:if="${#fields.hasErrors('lastAvailableDate')}" th:errors="*{lastAvailableDate}" class="text-danger"
                      style="color: red; font-size: 0.85em; margin-top: 5px; display: block;"></span>
            </div>

            <!-- Formació -->
            <div class="form-group">
                <label for="training">Formació</label>
                <div class="input-wrapper">
                    <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                        <path d="M6 12v5c0 1.1 2.7 2 6 2s6-.9 6-2v-5"></path>
                    </svg>
                    <input type="text" id="training" th:field="*{training}" placeholder="p.ex. Grau en Treball Social" required>
                </div>
                <span th:if="${#fields.hasErrors('training')}" th:errors="*{training}" class="text-danger"
                      style="color: red; font-size: 0.85em; margin-top: 5px; display: block;"></span>
            </div>

            <!-- Anys d'experiència -->
            <div class="form-group">
                <label for="yearsOfExperience">Anys d'experiència</label>
                <div class="input-wrapper">
                    <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                        <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"></path>
                        <line x1="12" y1="12" x2="12" y2="16"></line>
                        <line x1="10" y1="14" x2="14" y2="14"></line>
                    </svg>
                    <input type="number" id="yearsOfExperience" th:field="*{yearsOfExperience}" min="0" max="60" placeholder="p.ex. 3" required>
                </div>
                <span th:if="${#fields.hasErrors('yearsOfExperience')}" th:errors="*{yearsOfExperience}" class="text-danger"
                      style="color: red; font-size: 0.85em; margin-top: 5px; display: block;"></span>
            </div>

            <!-- URL del Currículum -->
            <div class="form-group">
                <label for="urlCv">URL del Currículum (CV)</label>
                <div class="input-wrapper">
                    <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                    </svg>
                    <input type="url" id="urlCv" th:field="*{urlCv}" placeholder="https://linkedin.com/in/el-teu-perfil" required>
                </div>
                <span th:if="${#fields.hasErrors('urlCv')}" th:errors="*{urlCv}" class="text-danger"
                      style="color: red; font-size: 0.85em; margin-top: 5px; display: block;"></span>
            </div>

            <!-- Botó d'enviament -->
            <button type="submit" class="btn-primary btn-block" style="border: none; margin-top: 10px; background-color: var(--color-primary); transition: background-color 0.3s;">
                <svg style="width: 18px; height: 18px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                Finalitzar Registre
            </button>

        </form>

    </div>
</div>

</body>
</html>
