<!DOCTYPE html>
<!-- ESTO ES UNO GENERADO POR IA TEMPORTAL Y QUE NI HE MIRADO ESTA DESMONTADO Y NO TIENE NINGUNA FUNCIONALIDAD MAS ALLA DE VER LA LISTA, HACED EL BUENO-->

<html lang="ca" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Panell de Tècnic - SgOVI</title>
</head>
<body>

<div layout:fragment="header">
    <header class="dashboard-header-nav">
        <div class="container header-inner">
            <div class="logo">
                <img th:src="@{/images/logo_SgOvi.png}" alt="Logo SgOVI" class="logo-img">
                SgOVI
            </div>
            <div class="nav-actions">
                <a th:href="@{/logout}" class="nav-link-btn logout-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Eixir
                </a>
            </div>
        </div>
    </header>
</div>

<main layout:fragment="content">
    <div class="container dashboard-main">
        <div class="welcome-section">
            <h2 class="welcome-title">Panell de Control del Tècnic</h2>
            <p class="welcome-subtitle">Gestiona les sol·licituds d'assistència i candidatures del sistema.</p>
        </div>

        <div class="dashboard-grid">
            <!-- Tarjeta para gestionar solicitudes -->
            <div class="dashboard-card">
                <div class="card-icon icon-orange">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                </div>
                <h3>Sol·licituds d'assistència</h3>
                <p>Revisa, aprova o rebutja les noves sol·licituds d'assistència pendents.</p>
                <a th:href="@{/assistanceRequest/manage/list}" class="btn-primary">Gestionar sol·licituds</a>
            </div>

            <!-- Aquí se podrían añadir más tarjetas en el futuro (Candidatures, Usuaris, etc.) -->
        </div>
    </div>
</main>

</body>
</html>
