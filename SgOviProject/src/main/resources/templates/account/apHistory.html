<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Historial de Sol·licituds - SgOVI</title>
</head>
<body>

<div layout:fragment="header">
    <div th:replace="~{fragments/technician-returnMain-header :: technician-returnMain-header}"></div>
</div>

<main layout:fragment="content">
    <div class="container dashboard-main">

        <div class="requests-header-action">
            <div>
                <a th:href="@{/account/details/{dni}(dni=${account.dni}, readOnly=true)}" class="btn-back">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Tornar al compte
                </a>
                <h2 class="welcome-title" style="margin-top: 0.5rem;">
                    Historial de Sol·licituds d'Assistència
                </h2>
                <p class="date-text">
                    Usuari: <strong th:text="${account.name + ' ' + account.surname}">Nom Cognom</strong>
                    &nbsp;·&nbsp; DNI: <span th:text="${account.dni}">12345678A</span>
                </p>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(requests)}" class="empty-state">
            <p>Aquest usuari no té cap sol·licitud d'assistència registrada.</p>
        </div>

        <div th:unless="${#lists.isEmpty(requests)}" class="table-card">
            <table class="styled-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>DATA CREACIÓ</th>
                    <th>TIPUS ASSISTENT</th>
                    <th>POBLACIÓ</th>
                    <th>DURACIÓ</th>
                    <th class="text-center">ESTAT</th>
                    <th class="text-center">ACCIONS</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="req : ${requests}">
                    <td><strong th:text="'#' + ${req.idApRequest}">1</strong></td>
                    <td th:text="${#temporals.format(req.creationDate, 'dd/MM/yyyy')}">01/01/2026</td>
                    <td th:text="${req.assistantType != null ? req.assistantType.description : 'No especificat'}">PAP</td>
                    <td th:text="${!#strings.isEmpty(req.city) ? req.city : '—'}">Castelló</td>
                    <td th:text="${req.monthsRequired} + ' mesos'">6 mesos</td>
                    <td class="text-center">
                        <span class="table-badge"
                              th:classappend="${'badge-' + #strings.toLowerCase(req.status.name())}"
                              th:text="${req.status.description}">Pendent</span>
                    </td>
                    <td class="text-center">
                        <div class="actions-cell">
                            <a th:href="@{/assistanceRequest/technician/details/{id}(id=${req.idApRequest})}"
                               class="action-btn" title="Veure detall de la sol·licitud">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:unless="${#lists.isEmpty(requests)}" class="results-count">
            Total: <strong th:text="${#lists.size(requests)}">0</strong> sol·licituds
        </div>

    </div>
</main>

</body>
</html>
