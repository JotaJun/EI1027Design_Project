<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Motiu del rebuig</title>
</head>
<body>

<div layout:fragment="header">
    <div th:replace="~{fragments/technician-returnMain-header :: technician-returnMain-header}"></div>
</div>

<main layout:fragment="content">
    <div class="container dashboard-main">

        <div class="card-header-section card-header-icon-layout">
            <div class="icon-square icon-orange">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="15" y1="9" x2="9" y2="15"></line>
                    <line x1="9" y1="9" x2="15" y2="15"></line>
                </svg>
            </div>
            <div class="text-center">
                <h2 class="card-title">Denegar compte</h2>
                <p class="card-subtitle">Indica el motiu de la denegació. És obligatori.</p>
            </div>
        </div>

        <br>

        <div class="card assistance-card">
            <form th:action="@{/account/denyReason}" th:object="${account}" method="post" class="assistance-form">
                <input type="hidden" th:field="*{dni}"/>

                <div class="form-group">
                    <label for="deniedReason">Motiu de la denegació <span class="required-asterisk">*</span></label>
                    <div class="input-wrapper">
                        <textarea id="deniedReason" th:field="*{deniedReason}" rows="5" maxlength="255" required
                                  placeholder="Escriu el motiu de la denegació..."></textarea>
                    </div>
                </div>

                <div class="form-actions-centered actions-bordered">
                    <button type="submit" class="btn-primary btn-icon">
                        Confirmar denegació
                    </button>
                    <a th:href="@{/account/details/{dni}(dni=${account.dni})}" class="btn-outline btn-icon">
                        Cancel·lar
                    </a>
                </div>
            </form>
        </div>

    </div>
</main>

</body>
</html>
