<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Donar de baixa - SgOVI</title>
</head>
<body>

<div layout:fragment="header">
    <div th:replace="~{fragments/legalGuardian-returnMain-header :: legalGuardian-returnMain-header}"></div>
</div>

<main layout:fragment="content">
    <div class="container dashboard-main">

        <div class="card-header-section card-header-icon-layout">
            <div class="icon-square icon-orange">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="15" y1="9" x2="9" y2="15"></line>
                    <line x1="9" y1="9" x2="15" y2="15"></line>
                </svg>
            </div>
            <div class="text-center">
                <h2 class="card-title">Donar de baixa compte</h2>
                <p class="card-subtitle">Indica el motiu pel qual vols donar de baixa aquest compte. És obligatori.</p>
            </div>
        </div>

        <br>

        <div class="card assistance-card">
            <div th:if="${error != null}" class="alert alert-danger" style="margin-bottom: 20px; color: #dc3545; background-color: #f8d7da; border: 1px solid #f5c6cb; padding: 10px; border-radius: 4px;">
                <p th:text="${error}"></p>
            </div>
            <form th:action="@{/account/deactivateWard}" th:object="${account}" method="post" class="assistance-form">
                <input type="hidden" th:field="*{dni}"/>

                <div class="form-group">
                    <label for="deniedReason">Motiu de la baixa <span class="required-asterisk">*</span></label>
                    <div class="input-wrapper">
                        <textarea id="deniedReason" th:field="*{deniedReason}" rows="5" maxlength="255" required
                                  placeholder="Escriu el motiu de la baixa..."></textarea>
                    </div>
                </div>

                <div class="form-actions-centered actions-bordered">
                    <button type="submit" class="btn-primary btn-icon">
                        Confirmar baixa
                    </button>
                    <a th:href="@{/account/wardDetails/{dni}(dni=${account.dni})}" class="btn-outline btn-icon">
                        Cancel·lar
                    </a>
                </div>
            </form>
        </div>

    </div>
</main>

</body>
</html>
