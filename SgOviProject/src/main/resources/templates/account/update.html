<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8" />
    <title>SgOvi - Edita cuenta</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body>
<main class="container mt-4">
    <h1>Editar cuenta</h1>
    <br>
    <form class="form-horizontal" th:action="@{/account/update}" th:object="${account}" method="post">

        <div class="form-group row mb-3">
            <label for="dni" class="control-label col-sm-2">DNI:</label>
            <div class="col-sm-4">
                <input id="dni" type="text" th:field="*{dni}" class="form-control" readonly>
            </div>
        </div>

        <div class="form-group row mb-3">
            <label for="name" class="control-label col-sm-2">Nombre:</label>
            <div class="col-sm-4">
                <input id="name" type="text" th:field="*{name}" class="form-control" required>
            </div>
        </div>

        <div class="form-group row mb-3">
            <label for="surname" class="control-label col-sm-2">Apellidos:</label>
            <div class="col-sm-4">
                <input id="surname" type="text" th:field="*{surname}" class="form-control" required>
            </div>
        </div>

        <div class="form-group row mb-3">
            <label for="birthday" class="control-label col-sm-2">Fecha de nacimiento:</label>
            <div class="col-sm-4">
                <input id="birthday" type="date" th:field="*{birthday}" class="form-control" required>
            </div>
        </div>

        <div class="form-group row mb-3">
            <label for="email" class="control-label col-sm-2">Email:</label>
            <div class="col-sm-4">
                <input id="email" type="email" th:field="*{email}" class="form-control" required>
            </div>
        </div>

        <div class="form-group row mb-3">
            <label for="password" class="control-label col-sm-2">Contraseña:</label>
            <div class="col-sm-4">
                <input id="password" type="password" th:field="*{password}" class="form-control" required>
            </div>
        </div>

        <div class="form-group row mb-3">
            <label for="phoneNumber" class="control-label col-sm-2">Teléfono:</label>
            <div class="col-sm-4">
                <input id="phoneNumber" type="tel" th:field="*{phoneNumber}" class="form-control">
            </div>
        </div>

        <div class="form-group row mb-3">
            <label for="street" class="control-label col-sm-2">Calle:</label>
            <div class="col-sm-4">
                <input id="street" type="text" th:field="*{street}" class="form-control">
            </div>
        </div>

        <div class="form-group row mb-3">
            <label for="city" class="control-label col-sm-2">Ciudad:</label>
            <div class="col-sm-4">
                <input id="city" type="text" th:field="*{city}" class="form-control">
            </div>
        </div>

        <div class="form-group row mb-3">
            <label for="zipCode" class="control-label col-sm-2">Código Postal:</label>
            <div class="col-sm-4">
                <input id="zipCode" type="text" th:field="*{zipCode}" class="form-control">
            </div>
        </div>

        <div class="form-group row mb-3">
            <label for="gender" class="control-label col-sm-2">Género:</label>
            <div class="col-sm-4">
                <select id="gender" th:field="*{gender}" class="form-select">
                    <option value="" disabled>Selecciona una opción...</option>
                    <option value="F">Femenino</option>
                    <option value="M">Masculino</option>
                    <option value="X">Prefiero no decirlo</option>
                </select>
            </div>
        </div>

        <div class="form-group row">
            <div class="col-sm-2"></div>
            <div class="col-sm-4">
                <button type="submit" class="btn btn-primary">Guardar cambios</button>
                <a href="/" class="btn btn-secondary ms-2">Cancelar</a>
            </div>
        </div>
    </form>
</main>
</body>
</html>
