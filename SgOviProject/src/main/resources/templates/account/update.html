<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Modificar Perfil de l'Usuari</title>
</head>
<body>

<div layout:fragment="header">
    <div th:replace="~{fragments/legalGuardian-returnMain-header :: legalGuardian-returnMain-header }"></div>
</div>

<main layout:fragment="content">
    <div class="container dashboard-main">

        <div class="assistance-card">
            <div class="requests-header-action">
                <a th:href="@{/account/wardDetails/{dni}(dni=${account.dni})}" class="btn-back">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Cancel·lar i tornar
                </a>
            </div>

            <div class="login-header">
                <h2 class="card-title">Modificar dades del compte</h2>
                <p class="card-subtitle">Actualitza la informació del perfil del teu usuari tutelat.</p>
            </div>

            <form th:action="@{/account/update}" method="post" th:object="${account}" class="assistance-form">

                <!-- Hidden fields per mantenir dades importants que no s'editen aquí directament -->
                <input type="hidden" th:field="*{status}" />
                <input type="hidden" th:field="*{deniedReason}" />

                <h3 class="detail-section-title mt-10">Dades Personals</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="dni">DNI</label>
                        <input type="text" id="dni" th:field="*{dni}" readonly class="form-control" />
                    </div>

                    <div class="form-group">
                        <label for="name">Nom <span class="required-asterisk">*</span></label>
                        <input type="text" id="name" th:field="*{name}" required maxlength="30"
                               th:classappend="${#fields.hasErrors('name')} ? 'input-error'" />
                        <span th:if="${#fields.hasErrors('name')}" class="error-message" th:errors="*{name}"></span>
                    </div>

                    <div class="form-group">
                        <label for="surname">Cognoms <span class="required-asterisk">*</span></label>
                        <input type="text" id="surname" th:field="*{surname}" required maxlength="50"
                               th:classappend="${#fields.hasErrors('surname')} ? 'input-error'" />
                        <span th:if="${#fields.hasErrors('surname')}" class="error-message" th:errors="*{surname}"></span>
                    </div>

                    <div class="form-group">
                        <label for="birthday">Data de naixement <span class="required-asterisk">*</span></label>
                        <input type="date" id="birthday" th:field="*{birthday}" required
                               th:max="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
                               th:classappend="${#fields.hasErrors('birthday')} ? 'input-error'" />
                        <span th:if="${#fields.hasErrors('birthday')}" class="error-message" th:errors="*{birthday}"></span>
                    </div>

                    <div class="form-group">
                        <label for="gender">Gènere <span class="required-asterisk">*</span></label>
                        <select id="gender" th:field="*{gender}" required th:classappend="${#fields.hasErrors('gender')} ? 'input-error'">
                            <option value="">Selecciona gènere...</option>
                            <option value="F">Femení</option>
                            <option value="M">Masculí</option>
                            <option value="X">Prefereixo no dir-ho</option>
                        </select>
                        <span th:if="${#fields.hasErrors('gender')}" class="error-message" th:errors="*{gender}"></span>
                    </div>

                    <div class="form-group">
                        <label for="email">Correu electrònic <span class="required-asterisk">*</span></label>
                        <input type="email" id="email" th:field="*{email}" required maxlength="30"
                               th:classappend="${#fields.hasErrors('email')} ? 'input-error'" />
                        <span th:if="${#fields.hasErrors('email')}" class="error-message" th:errors="*{email}"></span>
                    </div>

                    <div class="form-group">
                        <label for="phoneNumber">Telèfon</label>
                        <input type="text" id="phoneNumber" th:field="*{phoneNumber}" maxlength="9" title="El telèfon ha de tindre exactament 9 números"
                               th:classappend="${#fields.hasErrors('phoneNumber')} ? 'input-error'" />
                        <span th:if="${#fields.hasErrors('phoneNumber')}" class="error-message" th:errors="*{phoneNumber}"></span>
                    </div>

                    <div class="form-group">
                        <label for="city">Població</label>
                        <input type="text" id="city" th:field="*{city}" maxlength="30"
                               th:classappend="${#fields.hasErrors('city')} ? 'input-error'" />
                        <span th:if="${#fields.hasErrors('city')}" class="error-message" th:errors="*{city}"></span>
                    </div>

                    <div class="form-group">
                        <label for="street">Carrer / Via</label>
                        <input type="text" id="street" th:field="*{street}" maxlength="30"
                               th:classappend="${#fields.hasErrors('street')} ? 'input-error'" />
                        <span th:if="${#fields.hasErrors('street')}" class="error-message" th:errors="*{street}"></span>
                    </div>

                    <div class="form-group">
                        <label for="zipCode">Codi Postal</label>
                        <input type="text" id="zipCode" th:field="*{zipCode}" maxlength="5" title="El codi postal ha de tindre exactament 5 números"
                               th:classappend="${#fields.hasErrors('zipCode')} ? 'input-error'" />
                        <span th:if="${#fields.hasErrors('zipCode')}" class="error-message" th:errors="*{zipCode}"></span>
                    </div>
                </div>

                <th:block th:if="${session.userRole == 'LEGALGUARDIAN'}">
                    <h3 class="detail-section-title mt-10">Autorització</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="signatureCode">Codi de firma del Tutor Legal <span class="required-asterisk">*</span></label>
                            <input type="password" id="signatureCode" name="signatureCode" required class="form-control"
                                   th:classappend="${signatureError != null} ? 'input-error'" />
                            <span th:if="${signatureError}" class="error-message" th:text="${signatureError}"></span>
                            <small class="form-text text-muted">Per guardar els canvis cal introduir el teu codi de firma com a tutor legal.</small>
                        </div>
                    </div>
                </th:block>

                <div class="form-actions-centered actions-bordered">
                    <button type="submit" class="btn-primary btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg>
                        Guardar canvis
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

</body>
</html>
