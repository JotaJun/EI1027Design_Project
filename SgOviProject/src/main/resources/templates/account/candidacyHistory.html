<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Historial de Candidatures - SgOVI</title>
</head>
<body>

<div layout:fragment="header">
    <div th:replace="~{fragments/technician-returnMain-header :: technician-returnMain-header}"></div>
</div>

<main layout:fragment="content">
    <div class="container dashboard-main">

        <div class="requests-header-action">
            <div>
                <a th:href="@{/account/details/{dni}(dni=${account.dni}, readOnly=true)}" class="btn-back">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Tornar al compte
                </a>
                <h2 class="welcome-title" style="margin-top: 0.5rem;">
                    Historial de Candidatures
                </h2>
                <p class="date-text">
                    Personal d'assistència: <strong th:text="${account.name + ' ' + account.surname}">Nom Cognom</strong>
                    &nbsp;·&nbsp; DNI: <span th:text="${account.dni}">12345678A</span>
                </p>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(candidacies)}" class="empty-state">
            <p>Aquest personal d'assistència no ha participat en cap candidatura.</p>
        </div>

        <div th:unless="${#lists.isEmpty(candidacies)}" class="table-card">
            <table class="styled-table">
                <thead>
                <tr>
                    <th>ID CANDIDATURA</th>
                    <th>ID SOL·LICITUD</th>
                    <th>CANDIDAT</th>
                    <th>TIPUS</th>
                    <th>DATA MOD.</th>
                    <th class="text-center">ESTAT</th>
                    <th class="text-center">ACCIONS</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="cand : ${candidacies}">
                    <td><strong th:text="'#' + ${cand.candidacy.idCandidacy}">1</strong></td>
                    <td th:text="'#' + ${cand.candidacy.idApRequest}">1</td>
                    <td th:text="${cand.account.name + ' ' + cand.account.surname}">Nom Cognom</td>
                    <td th:text="${cand.papPati.staffType != null ? cand.papPati.staffType.description : '—'}">PAP</td>
                    <td th:text="${cand.candidacy.dateLastModified != null ? #temporals.format(cand.candidacy.dateLastModified, 'dd/MM/yyyy') : '—'}">01/01/2026</td>
                    <td class="text-center">
                        <span class="table-badge"
                              th:classappend="${'badge-' + #strings.toLowerCase(cand.candidacy.candidacyStatus.name())}"
                              th:text="${cand.candidacy.candidacyStatus.description}">Estat</span>
                    </td>
                    <td class="text-center">
                        <div class="actions-cell">
                            <!-- Veure detall candidatura (mode read-only tècnic) -->
                            <a th:href="@{/candidacy/details/{id}(id=${cand.candidacy.idCandidacy})}"
                               class="action-btn" title="Veure detall de la candidatura">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </a>
                            <!-- Veure contractes si CONTRACTED -->
                            <a th:if="${cand.candidacy.candidacyStatus.name() == 'CONTRACTED'}"
                               th:href="@{/contract/list/{id}(id=${cand.candidacy.idCandidacy})}"
                               class="action-btn text-success" title="Veure Contractes">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                    <line x1="16" y1="13" x2="8" y2="13"></line>
                                    <line x1="16" y1="17" x2="8" y2="17"></line>
                                    <polyline points="10 9 9 9 8 9"></polyline>
                                </svg>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:unless="${#lists.isEmpty(candidacies)}" class="results-count">
            Total: <strong th:text="${#lists.size(candidacies)}">0</strong> candidatures
        </div>

    </div>
</main>

</body>
</html>
