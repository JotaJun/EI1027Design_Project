<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Gestionar sol·licituds - SgOVI</title>
</head>
<body>

<div layout:fragment="header">
    <div th:replace="~{fragments/technician-returnMain-header :: technician-returnMain-header}"></div>
</div>

<main layout:fragment="content">
    <div class="container dashboard-main">

        <div class="requests-header-action">
            <h2 class="welcome-title">Gestionar sol·licituds pendents</h2>
        </div>

        <!-- Mensaje si no hay solicitudes -->
        <div th:if="${#lists.isEmpty(requestsPaged)}" class="empty-state">
            <p>No hi ha sol·licituds pendents d'aprovació en aquest moment.</p>
        </div>

        <!-- Tabla de solicitudes -->
        <div th:unless="${#lists.isEmpty(requestsPaged)}" class="table-card" th:with="requestsPage=${requestsPaged[__${selectedPage}__]}">
            <table class="styled-table">
                <thead>
                <tr>
                    <th>DATA DE CREACIÓ</th>
                    <th>USUARI</th>
                    <th>DNI</th>
                    <th>TIPUS</th>
                    <th>POBLACIÓ</th>
                    <th>DURACIÓ</th>
                    <th class="text-center">ACCIONS</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="req : ${requestsPage}">
                    <td th:text="${#temporals.format(req.creationDate, 'dd/MM/yyyy')}">24/03/2026</td>
                    <td th:text="${userNameByDni[req.dniOviUser]}">Nom Cognoms</td>
                    <td th:text="${req.dniOviUser}">12345678A</td>
                    <td><strong th:text="${req.assistantType}">PAP</strong></td>
                    <td th:text="${req.city}">Castelló</td>
                    <td th:text="${req.monthsRequired} + ' mesos'">6 mesos</td>

                    <td class="text-center">
                        <div class="actions-cell">
                            <!-- Botón Veure Detall -->
                            <a th:href="@{/assistanceRequest/manage/details/{id}(id=${req.idApRequest})}" class="action-btn" title="Veure detall">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </a>

                            <!-- Botón Aprovar (POST) -->
                            <form th:action="@{/assistanceRequest/manage/approve/{id}(id=${req.idApRequest})}" method="post">
                                <button type="submit" class="action-btn text-success" title="Aprovar sol·licitud">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="20 6 9 17 4 12"></polyline>
                                    </svg>
                                </button>
                            </form>

                            <!-- Botón Rebutjar (GET que lleva a poner motivo) -->
                            <a th:href="@{/assistanceRequest/manage/rejectReason/{id}(id=${req.idApRequest})}" class="action-btn text-danger" title="Rebutjar sol·licitud">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Contador de resultados -->
        <div th:unless="${#lists.isEmpty(requestsPaged)}" class="results-count">
            Mostrant del
            <strong th:text="${(selectedPage * pageLength) + 1}">1</strong>
            al
            <strong th:text="${(selectedPage * pageLength) + #lists.size(requestsPaged[selectedPage])}">5</strong>
            de
            <strong th:text="${totalRequests}">12</strong> sol·licituds
        </div>

        <!-- Paginación -->
        <nav aria-label="Selecció de pàgina"
             th:unless="${#lists.isEmpty(requestsPaged)}"
             class="pagination-container">
            <ul class="pagination">
                <li class="page-item"
                    th:classappend="${pageNumber == selectedPage + 1} ? 'active'"
                    th:each="pageNumber : ${pageNumbers}">

                    <a th:href="@{/assistanceRequest/manage/list(page=${pageNumber - 1})}"
                       th:text="${pageNumber}"
                       class="page-link">1</a>
                </li>
            </ul>
        </nav>

    </div>
</main>

</body>
</html>
