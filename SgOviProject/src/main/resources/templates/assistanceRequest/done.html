<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistència Personal feta - SgOVI</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

</head>
<body>

<main class="login-container">
    <div class="login-card login-card-success">

        <header class="login-header">
            <div class="logo logo-centered">
                <img th:src="@{/images/logo_SgOvi.png}" alt="Logo SgOVI" class="logo-img">
                SgOVI
            </div>
            <p class="system-name">SISTEMA DE GESTIÓ DE L'OFICINA PER LA VIDA INDEPENDENT</p>

            <div class="icon-square icon-green icon-large-circle">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>

            <h2>Sol·licitud registrada correctament</h2>
        </header>

        <p class="login-subtitle subtitle-spaced">
            La teua petició d'assistència personal s'ha registrat amb èxit.<br>
            Rebràs una notificació quan hi haja novetats.
        </p>

        <div class="stacked-btn-group">

            <!-- Botón 1 (Principal): Ir a la lista arrastrando el parámetro 'nova' -->
            <a th:href="@{/assistanceRequest/list(nova=${idApRequest})}" class="btn-primary btn-block">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="8" y1="6" x2="21" y2="6"></line>
                    <line x1="8" y1="12" x2="21" y2="12"></line>
                    <line x1="8" y1="18" x2="21" y2="18"></line>
                    <line x1="3" y1="6" x2="3.01" y2="6"></line>
                    <line x1="3" y1="12" x2="3.01" y2="12"></line>
                    <line x1="3" y1="18" x2="3.01" y2="18"></line>
                </svg>
                Veure llista de sol·licituds
            </a>

            <!-- Botón 2 (Secundario): Volver al menú principal -->
            <a th:href="@{/oviUser/main}" class="btn-outline btn-block">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                Tornar al Tauler Principal
            </a>

        </div>

    </div>
</main>

</body>
</html>
