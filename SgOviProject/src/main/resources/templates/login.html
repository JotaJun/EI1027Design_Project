<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sessió - SgOVI</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-container">
    <div class="login-card">

        <div class="login-header">
            <div class="logo logo-centered">
                <img th:src="@{/images/logo_SgOvi.png}" alt="Logo SgOVI" class="logo-img">
                SgOVI
            </div>
            <p class="system-name">SISTEMA DE GESTIÓ DE L'OFICINA PER LA VIDA INDEPENDENT</p>
            <h2>Benvingut/da</h2>
            <p class="login-subtitle">Inicia sessió per accedir al teu espai</p>
        </div>

        <form th:action="@{/login}" th:object="${details}" method="post" class="login-form">

            <div class="form-group">
                <label for="tipus_compte">Tipus de compte</label>
                <div class="select-wrapper">
                    <select id="tipus_compte" th:field="*{accountType}" aria-describedby="tipus-error" required>
                        <option value="OVIUSER" selected>Usuari OVI</option>
                        <option value="PAPPATI">Personal d'assistència professional</option>
                        <option value="LEGALGUARDIAN">Tutor Legal</option>
                        <option value="TECHNICIAN">Tècnic</option>
                    </select>
                </div>
                <span id="tipus-error" th:if="${#fields.hasErrors('accountType')}" th:errors="*{accountType}" class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <svg class="icon-left" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    <input type="email" id="email" th:field="*{email}" placeholder="email@exemple.com"
                           th:classappend="${#fields.hasErrors('email') or #fields.hasGlobalErrors()} ? 'input-error' : ''"
                           aria-describedby="email-error" required autofocus>
                </div>
                <span id="email-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-message"></span>
            </div>

            <div class="form-group">
                <label for="password">Contrasenya</label>
                <div class="input-wrapper">
                    <svg class="icon-left" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <input type="password" id="password" minlength="8" th:field="*{password}" placeholder="••••••••"
                           th:classappend="${#fields.hasErrors('password') or #fields.hasGlobalErrors()} ? 'input-error' : ''"
                           aria-describedby="password-error global-error" required>
                </div>

                <span id="password-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error-message"></span>

                <span id="global-error" th:if="${#fields.hasGlobalErrors()}" th:errors="*{global}" class="error-message" role="alert"></span>
            </div>

            <button type="submit" class="btn-primary btn-block btn-login">
                <svg class="icon-btn" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                    <polyline points="10 17 15 12 10 7"></polyline>
                    <line x1="15" y1="12" x2="3" y2="12"></line>
                </svg>
                Entrar
            </button>
        </form>

        <div class="login-footer">
            <p>Encara no tens compte?</p>
            <a th:href="@{/register}" class="btn-outline btn-block">Registrar-se</a>
        </div>

    </div>
</div>

</body>
</html>
